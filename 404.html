<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена | Санжар Махмудов</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: #0f172a;
      }

      .bg::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
        top: -100px;
        right: -100px;
        animation: pulse 6s ease-in-out infinite;
      }

      .bg::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
        bottom: -100px;
        left: -100px;
        animation: pulse 8s ease-in-out infinite reverse;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.7; }
        50% { transform: scale(1.15); opacity: 1; }
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 560px;
      }

      .error-code {
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -4px;
        animation: fadeDown 0.6s ease both;
      }

      .divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        border-radius: 2px;
        margin: 1.5rem auto;
        animation: fadeDown 0.6s 0.1s ease both;
      }

      .title {
        font-size: clamp(1.2rem, 4vw, 1.6rem);
        font-weight: 600;
        color: #f8fafc;
        margin-bottom: 1rem;
        animation: fadeDown 0.6s 0.2s ease both;
      }

      .subtitle {
        font-size: 1rem;
        color: #64748b;
        line-height: 1.7;
        margin-bottom: 2.5rem;
        animation: fadeDown 0.6s 0.3s ease both;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.9rem 2.2rem;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        border-radius: 50px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: fadeDown 0.6s 0.4s ease both;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(99, 102, 241, 0.45);
      }

      .logo {
        position: fixed;
        top: 1.5rem;
        left: 2rem;
        font-size: 1.4rem;
        font-weight: 800;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-decoration: none;
        z-index: 2;
      }

      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <a href="/" class="logo">SM</a>

    <div class="container">
      <div class="error-code">404</div>
      <div class="divider"></div>
      <h1 class="title">Страница не найдена</h1>
      <p class="subtitle">
        Такой страницы не существует или она была удалена.<br />
        Вернитесь на главную — там всё на месте.
      </p>
      <a href="/" class="btn">
        ← На главную
      </a>
    </div>
  </body>
</html>
